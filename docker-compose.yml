services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: kucharka
      MARIADB_USER: kucharka
      MARIADB_PASSWORD: ${DB_PASSWORD:-kucharkaVychoziHeslo}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-kucharkaVychoziHesloRoot}
    command: ["--innodb-buffer-pool-size=256M"]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    image: ${APP_IMAGE:-ghcr.io/domaciblbosti/kucharka:latest}
    pull_policy: never
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-38080}:8000"
    environment:
      DATABASE_URL: mysql+pymysql://kucharka:${DB_PASSWORD:-kucharkaVychoziHeslo}@db:3306/kucharka
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      SEARXNG_URL: ${SEARXNG_URL:-}
      RECIPE_DOMAINS: ${RECIPE_DOMAINS:-recepty.cz,toprecepty.cz,apetitonline.cz,vareni.cz,ireceptar.cz,klasicke-recepty.cz,bestrecepty.cz,kucharky.cz}
      SCRAPER_VERIFY_SSL: ${SCRAPER_VERIFY_SSL:-true}
      TRANSLATE_TO_CS: ${TRANSLATE_TO_CS:-true}
      AUTO_INGREDIENTS: ${AUTO_INGREDIENTS:-true}
      CRAWLER_ENABLED: ${CRAWLER_ENABLED:-false}
      UPDATE_ENABLED: ${UPDATE_ENABLED:-true}
      REPO_URL: ${REPO_URL:-https://github.com/DomaciBlbosti/Kucharka.git}
      REPO_BRANCH: ${REPO_BRANCH:-main}
      REPO_DIR: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_code:/app

volumes:
  db_data:
  app_code: